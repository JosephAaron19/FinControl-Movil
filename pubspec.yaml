name: fincontrol
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  geolocator: ^13.0.2
  camera: ^0.11.0+2
  intl: ^0.19.0
  google_fonts: ^6.2.1
  provider: ^6.1.2
  path_provider: ^2.1.3
  path: ^1.9.0
  http: ^1.2.1
  image_picker: ^1.1.2
  shared_preferences: ^2.2.3
  flutter_background_service: ^5.0.10
  flutter_local_notifications: ^17.1.0
  battery_plus: ^6.1.0
  device_info_plus: ^11.1.0
  permission_handler: ^12.0.1
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "web/icons/icon.png"
  min_sdk_android: 21 # android min sdk value

flutter_native_splash:
  color: "#FFFFFF"
  background_image: "web/icons/icon.png"
  android_12:
    image: "web/icons/icon.png"
    color: "#FFFFFF"
  fullscreen: true

flutter:
  uses-material-design: true
